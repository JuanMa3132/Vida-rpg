<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VIDA RPG · Iván</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
:root{
  --bg:#0A0F1E; --panel:#111A30; --soft:#0E1526; --line:#243354;
  --blue:#4DA3FF; --bluedim:#2C5FA8; --gold:#F5C542; --red:#E5484D; --green:#3DD68C;
  --text:#E8EEFA; --mut:#8B96B5;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; background:var(--bg); color:var(--text); font-family:'Rajdhani','Segoe UI',sans-serif; padding-bottom:40px;}
.mono{font-family:'JetBrains Mono',monospace;}
.wrap{max-width:460px; margin:0 auto; padding:18px 12px; display:flex; flex-direction:column; gap:16px;}
.win{position:relative; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px;}
.win::before,.win::after{content:''; position:absolute; width:14px; height:14px; border-color:var(--blue); border-style:solid;}
.win::before{top:-1px; left:-1px; border-width:2px 0 0 2px; border-radius:10px 0 0 0;}
.win::after{bottom:-1px; right:-1px; border-width:0 2px 2px 0; border-radius:0 0 10px 0;}
.tag{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2px; color:var(--blue);}
.bar{height:8px; border-radius:99px; background:#1B2440; overflow:hidden;}
.fill{height:100%; border-radius:99px; transition:width .6s cubic-bezier(.2,.8,.2,1);}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px;}
.card{background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:10px;}
button{font-family:inherit;}
.act{all:unset; background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:10px; cursor:pointer; display:block;}
.act:active{transform:scale(.95);}
.act .l{font-size:13px; font-weight:600; line-height:1.2;}
.act .x{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--gold); margin-top:3px;}
.rowflex{display:flex; justify-content:space-between; align-items:center;}
input,select{background:var(--soft); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:9px 10px; font-size:14px; font-family:inherit;}
input:focus,select:focus{outline:1px solid var(--blue);}
#toast{position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:50; background:var(--panel); padding:8px 16px; border-radius:8px; font-weight:700; font-size:14px; font-family:'JetBrains Mono',monospace; display:none; animation:rise .25s ease-out;}
@keyframes rise{from{opacity:0; transform:translate(-50%,8px);} to{opacity:1; transform:translate(-50%,0);}}
.quest{all:unset; display:flex; gap:8px; align-items:flex-start; background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:10px; cursor:pointer; width:100%;}
.quest.done{background:#10281F; border-color:var(--green); cursor:default;}
.quest.done .qt{text-decoration:line-through; color:var(--mut);}
.qt{font-size:13px; line-height:1.35;}
.qxp{font-family:'JetBrains Mono',monospace; color:var(--gold); font-size:10px;}
.logline{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--mut); line-height:1.6;}
.logline:first-child{color:var(--text);}
h1{font-size:26px; font-weight:700; margin:2px 0 0;}
@media (prefers-reduced-motion: reduce){ .fill,.act,#toast{transition:none; animation:none;} }
</style>
</head>
<body>
<div id="toast"></div>
<div class="wrap">

  <!-- ESTADO -->
  <div class="win">
    <div class="tag">[ VENTANA DE ESTADO ]</div>
    <div class="rowflex" style="align-items:flex-end; margin-top:4px;">
      <div>
        <h1>IVÁN</h1>
        <div id="title" style="color:var(--gold); font-weight:600; font-size:15px;"></div>
        <div style="color:var(--mut); font-size:12px;">Clase: Vigilante → Developer · Mapa: Bogotá</div>
      </div>
      <div style="text-align:right;">
        <div class="mono" style="font-size:11px; color:var(--mut);">NIVEL TOTAL</div>
        <div id="totalLvl" class="mono" style="font-size:34px; font-weight:700; color:var(--blue); line-height:1;"></div>
      </div>
    </div>
    <div id="nextTitle" style="color:var(--mut); font-size:12px; margin-top:8px;"></div>
  </div>

  <!-- ATRIBUTOS -->
  <div class="win">
    <div class="tag">[ ATRIBUTOS ]</div>
    <div class="grid2" id="statsGrid"></div>
  </div>

  <!-- ACCIONES -->
  <div class="win">
    <div class="tag">[ REGISTRAR ACCIÓN ]</div>
    <div class="grid2" id="actionsGrid"></div>
  </div>

  <!-- RAID -->
  <div class="win">
    <div class="tag" style="color:var(--red);">[ RAID · LA DEUDA ]</div>
    <div class="rowflex" style="margin-top:6px;">
      <span style="font-size:13px; color:var(--mut);">HP total restante</span>
      <span id="debtLeft" class="mono" style="font-weight:700; color:var(--red);"></span>
    </div>
    <div class="bar" style="height:10px; margin-top:4px;"><div id="debtFill" class="fill" style="background:linear-gradient(90deg,#B2383C,var(--red));"></div></div>
    <div id="dmgTotal" class="mono" style="font-size:10px; color:var(--green); margin-top:4px;"></div>
    <div id="bossList" style="display:flex; flex-direction:column; gap:10px; margin-top:14px;"></div>
    <div style="border-top:1px dashed var(--line); margin-top:14px; padding-top:12px;">
      <div class="mono" style="font-size:11px; color:var(--mut); margin-bottom:6px;">REGISTRAR ABONO (ataque)</div>
      <div style="display:flex; gap:8px;">
        <select id="bossSel" style="flex:0 0 42%; min-width:0;"></select>
        <input id="dmgAmt" inputmode="numeric" placeholder="$ monto" class="mono" style="flex:1; min-width:0;">
        <button class="act" style="background:var(--red); color:#fff; font-weight:700; padding:9px 14px;" onclick="attackBoss()">⚔️</button>
      </div>
    </div>
  </div>

  <!-- QUESTS -->
  <div class="win">
    <div class="tag">[ REGISTRO DE QUESTS ]</div>
    <div id="questList" style="display:flex; flex-direction:column; gap:8px; margin-top:12px;"></div>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <input id="newQuest" placeholder="Nueva quest…" style="flex:1; min-width:0;">
      <select id="newQuestStat" style="flex:0 0 62px;"></select>
      <button class="act" style="background:var(--blue); color:#04101F; font-weight:700; padding:9px 14px;" onclick="addQuest()">+</button>
    </div>
  </div>

  <!-- BITÁCORA -->
  <div class="win">
    <div class="tag">[ BITÁCORA ]</div>
    <div id="logList" style="margin-top:8px;"></div>
  </div>

  <button class="mono" style="all:unset; color:var(--mut); font-size:11px; cursor:pointer; text-align:center; padding:6px;" onclick="resetGame()">↺ reiniciar partida</button>
</div>

<script>
const KEY = 'vida-rpg-v1';
const STATS = [
  {id:'dev', name:'DEV', icon:'💻', desc:'Código real escrito por ti'},
  {id:'english', name:'ENGLISH', icon:'🗣️', desc:'Rumbo a B2'},
  {id:'finanzas', name:'FINANZAS', icon:'💰', desc:'Daño a la deuda'},
  {id:'sena', name:'SENA', icon:'🎓', desc:'Evidencias y título'},
  {id:'cuerpo', name:'CUERPO', icon:'💪', desc:'El hardware'},
  {id:'contenido', name:'CONTENIDO', icon:'🎬', desc:'La serie de tu vida'},
];
const ACTIONS = [
  {stat:'dev', label:'1h de código real', xp:30},
  {stat:'dev', label:'Oficio terminado', xp:150},
  {stat:'english', label:'Sesión inglés / Anki', xp:25},
  {stat:'english', label:'Video hablando inglés', xp:40},
  {stat:'sena', label:'Evidencia entregada', xp:60},
  {stat:'cuerpo', label:'Entrenar / caminar', xp:25},
  {stat:'contenido', label:'Grabar / editar clip', xp:35},
  {stat:'finanzas', label:'Día sin gasto impulsivo', xp:15},
];
const INIT = {
  stats:{dev:0, english:0, finanzas:0, sena:0, cuerpo:0, contenido:0},
  bosses:[
    {id:'mj', name:'MASTER JOVEN', sub:'Boss nv.1 · muere ~20 AGO', hpMax:695510, hp:695510, dead:false},
    {id:'bdb', name:'BANCO DE BOGOTÁ', sub:'Boss nv.2 · muere ~5 SEP', hpMax:933784, hp:933784, dead:false},
    {id:'nu', name:'NU', sub:'Boss nv.3 · muere ~20 SEP', hpMax:886642, hp:886642, dead:false},
    {id:'vg', name:'VISA GOLD', sub:'BOSS FINAL · muere ~20 DIC', hpMax:7511227, hp:7511227, dead:false},
  ],
  quests:[
    {id:1, text:'⚔️ QUEST LEGENDARIA: hablar con el instructor (nivelación + etapa productiva)', stat:'sena', xp:200, done:false},
    {id:2, text:'Oficio 1: CRUD de consola en Java, terminado y subido a GitHub', stat:'dev', xp:150, done:false},
    {id:3, text:'Auditar suscripciones (Apple, Claude, Smart Fit): matar o pasar a débito', stat:'finanzas', xp:80, done:false},
    {id:4, text:'Cotizar cambio de glass en 2-3 sitios', stat:'finanzas', xp:40, done:false},
    {id:5, text:'Primer abono del plan (20 de julio)', stat:'finanzas', xp:60, done:false},
    {id:6, text:'Unirme a un Discord/comunidad dev y presentarme', stat:'dev', xp:50, done:false},
  ],
  log:[], totalAbonado:0, created:Date.now(),
};
const TITLES = [[0,'Vigilante Nocturno'],[6,'Aprendiz del Sistema'],[12,'Cazador de Deudas'],[18,'Forjador de Código'],[26,'Dev en Ascenso'],[36,'Leyenda de Dos Mundos']];

let S;
try { S = JSON.parse(localStorage.getItem(KEY)) || structuredClone(INIT); }
catch(e){ S = structuredClone(INIT); }

function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }
function fmt(n){ return '$' + Math.max(0,Math.round(n)).toLocaleString('es-CO'); }
function lvl(xp){ let l=0,r=xp,c=100; while(r>=c){r-=c;l++;c=100+l*40;} return {l,into:r,need:c}; }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

let toastT;
function toast(txt,color){
  const t=document.getElementById('toast');
  t.textContent=txt; t.style.color=color; t.style.border='1px solid '+color;
  t.style.boxShadow='0 0 18px '+color+'44'; t.style.display='block';
  clearTimeout(toastT); toastT=setTimeout(()=>t.style.display='none',1900);
}
function addLog(e){ S.log.unshift({ts:Date.now(), e}); S.log=S.log.slice(0,25); }

function gainXp(statId,xp,label){
  S.stats[statId]+=xp;
  addLog('+'+xp+' '+statId.toUpperCase()+' · '+label);
  save(); render();
  toast('+'+xp+' XP '+STATS.find(t=>t.id===statId).icon, 'var(--gold)');
}

function attackBoss(){
  const sel=document.getElementById('bossSel').value;
  const raw=document.getElementById('dmgAmt').value.replace(/[^\d]/g,'');
  const amt=parseInt(raw,10);
  if(!amt||amt<=0) return;
  const b=S.bosses.find(x=>x.id===sel); if(!b||b.dead) return;
  b.hp=Math.max(0,b.hp-amt);
  const killed=b.hp<=0; if(killed) b.dead=true;
  const xp=Math.round(amt/10000)+(killed?100:0);
  S.stats.finanzas+=xp; S.totalAbonado+=amt;
  addLog(killed ? '☠️ BOSS DERROTADO: '+b.name+' · golpe final '+fmt(amt)
                : '⚔️ '+fmt(amt)+' de daño a '+b.name+' (+'+xp+' FINANZAS)');
  document.getElementById('dmgAmt').value='';
  save(); render();
  toast(killed?'☠️ ¡BOSS DERROTADO!':'⚔️ −'+fmt(amt)+' HP', killed?'var(--green)':'var(--red)');
}

function toggleQuest(id){
  const q=S.quests.find(x=>x.id===id);
  if(!q||q.done) return;
  q.done=true; S.stats[q.stat]+=q.xp;
  addLog('✅ Quest cumplida (+'+q.xp+' '+q.stat.toUpperCase()+')');
  save(); render();
  toast('✅ Quest +'+q.xp+' XP','var(--green)');
}

function addQuest(){
  const inp=document.getElementById('newQuest');
  const t=inp.value.trim(); if(!t) return;
  S.quests.push({id:Date.now(), text:t, stat:document.getElementById('newQuestStat').value, xp:60, done:false});
  inp.value=''; save(); render();
}

function resetGame(){
  if(!confirm('¿Reiniciar TODA la partida? Se pierde el progreso.')) return;
  S=structuredClone(INIT); save(); render();
}

function render(){
  const L={}; STATS.forEach(t=>L[t.id]=lvl(S.stats[t.id]));
  const total=Object.values(L).reduce((a,b)=>a+b.l,0);
  document.getElementById('totalLvl').textContent=total;
  document.getElementById('title').textContent=TITLES.filter(x=>total>=x[0]).pop()[1];
  const nt=TITLES.find(x=>total<x[0]);
  document.getElementById('nextTitle').innerHTML=nt?('Próximo título a nivel '+nt[0]+': <span style="color:var(--text)">'+nt[1]+'</span>'):'Título máximo alcanzado. GG, leyenda.';

  document.getElementById('statsGrid').innerHTML=STATS.map(t=>{
    const x=L[t.id];
    return '<div class="card"><div class="rowflex"><span style="font-weight:700;font-size:14px;">'+t.icon+' '+t.name+'</span><span class="mono" style="color:var(--gold);font-weight:700;font-size:14px;">Nv.'+x.l+'</span></div>'
      +'<div class="bar" style="margin-top:8px;"><div class="fill" style="width:'+(x.into/x.need*100)+'%;background:linear-gradient(90deg,var(--gold),#FFDF8E);"></div></div>'
      +'<div class="mono" style="font-size:10px;color:var(--mut);margin-top:4px;">'+x.into+'/'+x.need+' XP · '+t.desc+'</div></div>';
  }).join('');

  document.getElementById('actionsGrid').innerHTML=ACTIONS.map((a,i)=>{
    const ic=STATS.find(t=>t.id===a.stat).icon;
    return '<button class="act" onclick="gainXp(\''+a.stat+'\','+a.xp+',\''+a.label.replace(/'/g,"\\'")+'\')"><div class="l">'+ic+' '+a.label+'</div><div class="x">+'+a.xp+' XP</div></button>';
  }).join('');

  const left=S.bosses.reduce((a,b)=>a+b.hp,0), max=S.bosses.reduce((a,b)=>a+b.hpMax,0);
  document.getElementById('debtLeft').textContent=fmt(left);
  document.getElementById('debtFill').style.width=(left/max*100)+'%';
  document.getElementById('dmgTotal').textContent='Daño total infligido: '+fmt(S.totalAbonado)+' · Victoria proyectada: 20 DIC 2026';

  document.getElementById('bossList').innerHTML=S.bosses.map(b=>
    '<div class="card" style="opacity:'+(b.dead?.55:1)+';border-color:'+(b.dead?'var(--green)':'var(--line)')+';">'
    +'<div class="rowflex"><span style="font-weight:700;font-size:14px;'+(b.dead?'text-decoration:line-through;':'')+'">'+(b.dead?'☠️ ':'🃏 ')+b.name+'</span>'
    +'<span class="mono" style="font-size:12px;font-weight:700;color:'+(b.dead?'var(--green)':'var(--red)')+';">'+(b.dead?'DERROTADO':fmt(b.hp))+'</span></div>'
    +'<div class="bar" style="margin-top:8px;"><div class="fill" style="width:'+(b.hp/b.hpMax*100)+'%;background:'+(b.dead?'var(--green)':'linear-gradient(90deg,#8E2F33,var(--red))')+';"></div></div>'
    +'<div class="mono" style="font-size:10px;color:var(--mut);margin-top:4px;">'+b.sub+'</div></div>'
  ).join('');

  document.getElementById('bossSel').innerHTML=S.bosses.filter(b=>!b.dead).map(b=>'<option value="'+b.id+'">'+b.name+'</option>').join('') || '<option>—</option>';

  document.getElementById('questList').innerHTML=S.quests.map(q=>
    '<button class="quest'+(q.done?' done':'')+'" onclick="toggleQuest('+q.id+')"><span style="font-size:15px;">'+(q.done?'✅':'⬜')+'</span>'
    +'<span class="qt">'+esc(q.text)+' <span class="qxp">+'+q.xp+' '+q.stat.toUpperCase()+'</span></span></button>'
  ).join('');

  const nqs=document.getElementById('newQuestStat');
  if(!nqs.options.length) nqs.innerHTML=STATS.map(t=>'<option value="'+t.id+'">'+t.icon+'</option>').join('');

  document.getElementById('logList').innerHTML = S.log.length===0
    ? '<div style="color:var(--mut);font-size:13px;">Aún no hay registros. Toca una acción y empieza a farmear XP.</div>'
    : S.log.map(l=>'<div class="logline"><span style="color:var(--bluedim);">'+new Date(l.ts).toLocaleDateString('es-CO',{day:'2-digit',month:'short'})+'</span> · '+esc(l.e)+'</div>').join('');
}
render();
</script>
</body>
</html>
